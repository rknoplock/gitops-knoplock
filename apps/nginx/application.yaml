apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx

spec:
  project: default

  source:
    repoURL: https://github.com/rknoplock/gitops-knoplock.git

    targetRevision: HEAD

    path: charts/nginx

    helm:
      valueFiles:
        - ../../applications/nginx/dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true